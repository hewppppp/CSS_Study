<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

<style>
    .container {
        background-color: rgb(42, 246, 246);
        color: azure;
        margin: 10px 30px;
        border-radius: 15px;
        padding: 10px;
    }

    .nav {
        display: flex;
        justify-content: space-between;
    }

    .nav a {
        color: white;
        text-decoration: none;
    }

    .first {
        display: flex;
        list-style: none;
        gap: 20px;
    }

    .content {
        display: flex;
        justify-content: space-between;
    }

    .content .text {
        width: 300px;
        margin: 30px 90px;
    }

    .content .image {
        margin: 60px 60px 0 0;
    }

    .content .text p {
        margin: 0 0 15px 30px;
    }

    .text button {
        background-color: rgb(105, 222, 193);
        border-radius: 10px;
        border: none;
        margin: 0 0 0 30px;
        padding: 5px 15px;
    }
</style>

<body>
    <div class="container">
        <div class="nav">
            <ul class="first">
                <li><a href=""><i class="fa-solid fa-bars-staggered fa-xl" style="color: rgb(237, 239, 243);"></i></a>
                </li>
                <li><a href="">Home</a></li>
                <li><a href="">Sevice</a></li>
                <li><a href="">About</a></li>
            </ul>
            <ul class="second">
                <li><a href="">Contact Us</a></li>
            </ul>
        </div>
        <div class="content">
            <div class="text">
                <h1>Simple<br>Web Design</h1>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. In facilis tenetur nobis sit omnis minima
                    quo neque iusto eaque velit?</p>
                <a href=""><button>Portfolio</button></a>
            </div>
            <div class="image">
                <img src="imagewantam.jpg" alt="myimage" height="200px" width="200px">
            </div>
        </div>
    </div>

</html>
