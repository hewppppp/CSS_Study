<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbars</title>
    <style>
        .navbar1{
            background-color:rgb(47, 46, 46);
            align-items: center;
            display: flex;
            justify-content: space-between;
            border-radius: 0px;
            padding: 0px 0px 0px 30px;
            color: azure;
            margin-top: 60px;
        }
        .navbar1 a{color: azure;
            text-decoration: none;
            margin: 20px;
        }
        .navbar1 .list{list-style: none;
            display: flex;
        }
        .navbar1 .button{
             border-radius: 20px;
             display: inline-block;
             background-color: skyblue;
        }
        .navbar2{
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color:rgb(47, 46, 46); 
            padding: 0px 30px 0px 0px;
            color: azure;
            margin-top: 60px;
        }
        .navbar2 .list2{
            display: flex;
            list-style: none;
            gap: 20px;
        }
        .navbar2 a{
            color: azure;
            text-decoration: none;
            margin: 20px;
        }
    .navbar2 .button2{
        border-radius: 20px;
             display: inline-block;
             background-color: skyblue;
    }
    .navbar3{display: flex;
        align-items: center;
        justify-content:space-between;
        gap: 20px;
        background-color:rgb(47, 46, 46); 
        padding: 0px 0px 0px 30px;
        color: azure;
        margin-top: 60px;
    }
    .navbar3 a{
        color: azure;
        text-decoration: none;
    }
    .navbar3 .list3{  
        display: flex;
            list-style: none;
            gap: 20px;
            margin: 0px auto;
    }
    .navbar3 .button3{  
        border-radius: 20px;
        display: inline-block;
        background-color: skyblue;
        margin-left: 20px;
    }
    </style>
</head>
<body>
    <div class="navbar1">
      <h3>LOGOBAKERY</h3>
      <ul class="list">
        <li><a href="">Services</a></li>
        <li><a href="">Projects</a></li>
        <li><a href="">About</a></li>
      </ul> 
      <a class="button" href="">Contact</a>
    </div>
<div class="navbar2">
    <ul class="list2">
        <li><a href="">Services</a></li>
        <li><a href="">Projects</a></li>
        <li><a href="">About</a></li>
    </ul>
    <a href="" class="button2">Contact</a>
    <h3>LOGOBAKERY</h3>
</div>
<div class="navbar3">
<h3>LOGOBAKERY</h3>
<ul class="list3">
<li><a href="">Services</a></li>
<li><a href="">Projects</a></li>
<li><a href="">About</a></li>
</ul>
<a href="" class="button3">Contact</a>
</div>
</body>
</html>
